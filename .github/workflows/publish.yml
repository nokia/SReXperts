---
name: Publish docs
on:
  workflow_dispatch:

env:
  MKDOCS_MATERIAL_VER: v9.7.5-2

jobs:
  publish-docs:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: docker run --env CI=true -v $(pwd):/docs --entrypoint mkdocs ghcr.io/eda-labs/mkdocs-material:$MKDOCS_MATERIAL_VER gh-deploy --force
