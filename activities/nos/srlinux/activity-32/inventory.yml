inventory:
  path: /home/admin/inventory
  launch-command: /home/admin/inventory/inventory
  version-command: /home/admin/inventory/inventory --version
  failure-action: wait=10
  config-delivery-format: json
  yang-modules:
    names:
      - inventory
    source-directories:
      - /home/admin/inventory/yang
