interface ethernet-1/1 {
    admin-state enable
    subinterface 0 {
        type bridged
        admin-state enable
    }
}
interface ethernet-1/2 {
    admin-state enable
    subinterface 0 {
        type bridged
        admin-state enable
    }
}
interface ethernet-1/3 {
    admin-state enable
    subinterface 0 {
        type bridged
        admin-state enable
    }
}
interface system0 {
    subinterface 0 {
        ipv4 {
            admin-state enable
            address 10.46.${INSTANCE_ID}.51/32 {
            }
        }
        ipv6 {
            admin-state enable
            address fd00:fde8::${INSTANCE_ID}:51/128 {
            }
        }
    }
}
network-instance default {
    type default
    ip-forwarding {
        receive-ipv4-check false
        receive-ipv6-check false
    }
    interface system0.0 {
    }
}
network-instance ixp {
    type mac-vrf
    admin-state enable
    interface pe1 {
        interface-ref {
            interface ethernet-1/1
            subinterface 0
        }
    }
    interface peering2 {
        interface-ref {
            interface ethernet-1/2
            subinterface 0
        }
    }
    interface transit1 {
        interface-ref {
            interface ethernet-1/3
            subinterface 0
        }
    }
}
