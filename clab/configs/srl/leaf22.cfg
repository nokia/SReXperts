            router-advertisement {
                router-role {
                    admin-state enable
                }
            }
        }
    }
}
interface irb0 {
    admin-state enable
    subinterface 1 {
        admin-state enable
        ip-mtu 8700
        ipv4 {
            admin-state enable
            address 10.64.40.1/24 {
                anycast-gw true
            }
            arp {
                learn-unsolicited true
                evpn {
                    advertise static {
                    }
                    advertise dynamic {
                    }
                }
            }
        }
        ipv6 {
            admin-state enable
            address fd00:fde8:0:40::1/64 {
                anycast-gw true
            }
            neighbor-discovery {
                learn-unsolicited global
                evpn {
                    advertise static {
                    }
                    advertise dynamic {
                    }
                }
            }
        }
        anycast-gw {
            virtual-router-id 1
        }
    }
    subinterface 2101 {
        admin-state enable
        ip-mtu 8700
        ipv4 {
            admin-state enable
            address 192.168.40.1/24 {
                anycast-gw true
            }
            arp {
                learn-unsolicited true
                evpn {
                    advertise static {
                    }
                    advertise dynamic {
                    }
                }
            }
        }
        ipv6 {
            admin-state enable
            address fd00:ffdd:0:40::1/64 {
                anycast-gw true
            }
            neighbor-discovery {
                learn-unsolicited global
                evpn {
                    advertise static {
                    }
                    advertise dynamic {
                    }
                }
            }
        }
        anycast-gw {
            virtual-router-id 1
        }
    }
}
interface lag1 {
    description leaf22-client22
    admin-state enable
    vlan-tagging true
    subinterface 1 {
        type bridged
        vlan {
            encap {
                single-tagged {
                    vlan-id 1
                }
            }
        }
    }
    subinterface 2101 {
        type bridged
        vlan {
            encap {
                single-tagged {
                    vlan-id 2101
                }
            }
        }
    }
    lag {
        lag-type lacp
        member-speed 10G
        lacp {
            interval FAST
            lacp-mode ACTIVE
            admin-key 22
            system-id-mac 00:00:00:00:00:22
            system-priority 22
        }
    }
}
interface system0 {
    subinterface 0 {
        ipv4 {
            admin-state enable
            address 10.46.${INSTANCE_ID}.44/32 {
            }
        }
        ipv6 {
            admin-state enable
            address fd00:fde8::${INSTANCE_ID}:44/128 {
            }
        }
    }
}
system {
    network-instance {
        protocols {
            evpn {
                ethernet-segments {
                    bgp-instance 1 {
                        ethernet-segment ES-22 {
                            admin-state enable
                            esi 01:DC:02:22:22:22:22:00:00:01
                            multi-homing-mode all-active
                            interface lag1 {
                            }
                        }
                    }
                }
            }
            bgp-vpn {
                bgp-instance 1 {
                }
            }
        }
    }
}
network-instance default {
    type default
    ip-forwarding {
        receive-ipv4-check false
        receive-ipv6-check false
    }
    interface ethernet-1/31.0 {
    }
    interface ethernet-1/32.0 {
    }
    interface system0.0 {
    }
    interface irb0.1 {
    }
    protocols {
        bgp {
            autonomous-system 4200002002
            router-id 10.46.${INSTANCE_ID}.44
            dynamic-neighbors {
                interface ethernet-1/31.0 {
                    peer-group spine
                    allowed-peer-as [
                        4200002000
                    ]
                }
                interface ethernet-1/32.0 {
                    peer-group spine
                    allowed-peer-as [
                        4200002000
                    ]
                }
            }
            ebgp-default-policy {
                import-reject-all false
                export-reject-all false
            }
            afi-safi evpn {
                evpn {
                    rapid-update true
                }
                multipath {
                    allow-multiple-as true
                    ebgp {
                        maximum-paths 64
                    }
                    ibgp {
                        maximum-paths 64
                    }
                }
            }
            afi-safi ipv4-unicast {
                admin-state enable
                multipath {
                    allow-multiple-as true
                    ebgp {
                        maximum-paths 32
                    }
                    ibgp {
                        maximum-paths 32
                    }
                }
                ipv4-unicast {
                    advertise-ipv6-next-hops true
                    receive-ipv6-next-hops true
                }
            }
            afi-safi ipv6-unicast {
                admin-state enable
                multipath {
                    allow-multiple-as true
                    ebgp {
                        maximum-paths 32
                    }
                    ibgp {
                        maximum-paths 32
                    }
                }
            }
            transport {
                mtu-discovery true
            }
            group iBGP-DC {
                next-hop-self true
                peer-as 65000
                afi-safi evpn {
                    admin-state enable
                }
                afi-safi ipv4-unicast {
                    admin-state disable
                }
                afi-safi ipv6-unicast {
                    admin-state disable
                }
                local-as {
                    as-number 65000
                    prepend-global-as false
                }
                timers {
                    connect-retry 1
                    minimum-advertisement-interval 1
                }
                transport {
                    local-address 10.46.${INSTANCE_ID}.44
                }
            }
            group spine {
                export-policy [ local ]
            }
            neighbor fd00:fde8::${INSTANCE_ID}:13 {
                peer-group iBGP-DC
            }
        }
    }
}
network-instance macvrf21 {
    type mac-vrf
    admin-state enable
    interface irb0.1 {
    }
    interface lag1.1 {
    }
    vxlan-interface vxlan1.21 {
    }
    protocols {
        bgp-evpn {
            bgp-instance 1 {
                admin-state enable
                vxlan-interface vxlan1.21
                evi 21
                ecmp 8
            }
        }
        bgp-vpn {
            bgp-instance 1 {
                route-target {
                    export-rt target:65000:21
                    import-rt target:65000:21
                }
            }
        }
    }
}
