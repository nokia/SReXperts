interface ethernet-1/2 {
    description leaf22-client22
    admin-state enable
    ethernet {
        aggregate-id lag1
    }
}
interface ethernet-1/31 {
    description leaf22-spine21
    admin-state enable
    subinterface 0 {
        ip-mtu 9198
        ipv6 {
            admin-state enable
            router-advertisement {
                router-role {
                    admin-state enable
                }
            }
        }
    }
}
interface ethernet-1/32 {
    description leaf22-spine22
    admin-state enable
    subinterface 0 {
