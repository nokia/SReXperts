routing-policy {
    policy local {
        default-action {
            policy-result reject
        }
        statement loopback {
            match {
                protocol local
            }
            action {
                policy-result accept
            }
        }
    }
}
tunnel-interface vxlan1 {
    vxlan-interface 21 {
        type bridged
        ingress {
            vni 21
        }
    }
    vxlan-interface 2101 {
        type bridged
        ingress {
            vni 2101
        }
    }
    vxlan-interface 2201 {
        type routed
        ingress {
            vni 2201
        }
        egress {
            source-ip use-system-ipv4-address
        }
    }
}
