routing-policy {
    policy iBGP-redist {
        default-action {
            policy-result reject
        }
        statement aggregate {
            match {
                protocol aggregate
            }
            action {
                policy-result accept
                bgp {
                    next-hop {
                        set self
                    }
                }
            }
        }
        statement local {
            match {
                protocol local
            }
            action {
                policy-result accept
                bgp {
                    next-hop {
                        set self
                    }
                }
            }
        }
    }
}
network-instance default {
    type default
    mpls-forwarding {
        forward-received-packets true
    }
    ip-forwarding {
        receive-ipv4-check false
        receive-ipv6-check false
    }
    interface ethernet-1/1.0 {
    }
    interface ethernet-1/2.0 {
    }
    interface ethernet-1/3.0 {
    }
    interface irb0.1 {
    }
    interface system0.0 {
    }
    protocols {
        bgp {
            autonomous-system 65000
            router-id 10.46.${INSTANCE_ID}.13
            best-path-selection {
                advertise-inactive true
            }
            dynamic-neighbors {
                accept {
                    match fd00:fde8::/96 {
                        peer-group iBGP-DC
                        allowed-peer-as [
                            65000
                        ]
                    }
                }
            }
            afi-safi evpn {
                evpn {
                    advertise-ipv6-next-hops true
                    rapid-update true
                }
            }
            afi-safi ipv4-unicast {
                add-paths {
                    receive true
                    send true
                    send-max 8
                }
                ipv4-unicast {
                    advertise-ipv6-next-hops true
                    receive-ipv6-next-hops true
                }
            }
            afi-safi ipv6-unicast {
                add-paths {
                    receive true
                    send true
                    send-max 8
                }
            }
            afi-safi l3vpn-ipv4-unicast {
                admin-state enable
                l3vpn-ipv4-unicast {
                    advertise-ipv6-next-hops true
                    receive-ipv6-next-hops true
                }
            }
            afi-safi l3vpn-ipv6-unicast {
                admin-state enable
            }
            group iBGP-CORE {
                admin-state enable
                peer-as 65000
                export-policy [
                    iBGP-redist
                ]
                afi-safi ipv4-unicast {
                    admin-state enable
                }
                afi-safi ipv6-unicast {
                    admin-state enable
                }
                afi-safi l3vpn-ipv4-unicast {
                    admin-state enable
                }
                afi-safi l3vpn-ipv6-unicast {
                    admin-state enable
                }
            }
            group iBGP-DC {
                admin-state enable
                peer-as 65000
                afi-safi evpn {
                    admin-state enable
                }
                afi-safi ipv4-unicast {
                    admin-state disable
                }
                afi-safi ipv6-unicast {
                    admin-state disable
                }
                route-reflector {
                    client true
                    cluster-id 10.46.${INSTANCE_ID}.13
                }
            }
            neighbor fd00:fde8::${INSTANCE_ID}:11 {
                admin-state enable
                peer-group iBGP-CORE
            }
            neighbor fd00:fde8::${INSTANCE_ID}:12 {
                admin-state enable
                peer-group iBGP-CORE
            }
        }
        isis {
            dynamic-label-block sr-labels
            instance core {
                admin-state enable
                level-capability L2
                net [
                    49.0000.1046.${CNSP_INSTANCE_ID}.0013.00
                ]
                ipv4-unicast {
                    admin-state enable
                }
                ipv6-unicast {
                    admin-state enable
                    multi-topology false
                }
                loopfree-alternate {
                    admin-state enable
                    remote-lfa {
                        admin-state enable
                    }
                }
                segment-routing {
                    mpls {
                        dynamic-adjacency-sids {
                            all-interfaces true
                        }
                    }
                }
                interface ethernet-1/1.0 {
                    circuit-type point-to-point
                }
                interface ethernet-1/2.0 {
                    circuit-type point-to-point
                }
                interface ethernet-1/3.0 {
                    passive true
                }
                interface system0.0 {
                    passive true
                    segment-routing {
                        mpls {
                            ipv4-node-sid {
                                index 13
                            }
                            ipv6-node-sid {
                                index 113
                            }
                        }
                    }
                }
            }
        }
    }
    segment-routing {
        mpls {
            global-block {
                label-range static
            }
        }
    }
    mpls {
    }
    aggregate-routes {
        route 10.64.13.0/24 {
            admin-state enable
            generate-icmp true
            summary-only false
            aggregator {
                as-number 65000
            }
        }
        route fd00:fde8:0:13::/64 {
            admin-state enable
            generate-icmp true
            summary-only false
            aggregator {
                as-number 65000
            }
        }
    }
}
network-instance macvrf-dns {
    type mac-vrf
    admin-state enable
    interface ethernet-1/4.0 {
    }
    interface irb0.1 {
    }
}
