            }
        }
        policy-statement "eBGP-redist-dc" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "eBGP-accept-dc" {
            entry 10 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "iBGP-redist" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 30 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                    next-hop self
                }
            }
            entry 40 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            default-action {
                action-type reject
            }
        }
    }
