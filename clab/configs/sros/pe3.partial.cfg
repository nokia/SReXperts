configure {
### CA for Activity 19-Enable_per_service-PQC_encryption_with_ANYsec
    anysec {
        reserved-label-block "Anysec"
        mka-over-ip {
            mka-udp-port 10000
        }
        mpls {
            security-termination-policies {
                policy "STP_All" {
                    admin-state enable
                    local-address 10.46.${INSTANCE_ID}.23
                    rx-must-be-encrypted false
                    protocol sr-isis
                    igp-instance-id 0
                }
            }
            service-encryption {
                encryption-group "EG_A" {
                    admin-state enable
                    security-termination-policy "STP_All"
                    encryption-label 2203
                    ca-name "CA_A"
                    peer 10.46.${INSTANCE_ID}.22 {
                        admin-state enable
                    }
                }
                encryption-group "EG_B" {
                    admin-state enable
                    security-termination-policy "STP_All"
                    encryption-label 2303
                    ca-name "CA_B"
                    peer 10.46.${INSTANCE_ID}.22 {
                        admin-state enable
                    }
                }
            }
        }
    }
    log {
        log-id "98" {
            description "Default System Log to Syslog"
            source {
                main true
            }
            destination {
                syslog "1"
            }
        }
        route-preference {
            primary outband
        }
        syslog "1" {
            description "syslog container"
            address 10.128.${INSTANCE_ID}.74
            severity info
            port 5514
            hostname {
                use-system-name { }
            }
        }
    }
### CA for Activity 19-Enable_per_service-PQC_encryption_with_ANYsec
    macsec {
        connectivity-association "CA_A" {
            admin-state enable
            description "Anysec Service A"
            clear-tag-mode none
            cipher-suite gcm-aes-xpn-128
            anysec true
            static-cak {
                active-psk 1
                pre-shared-key 1 {
                    encryption-type aes-128-cmac
                    cak "AA0123456789ABCDEF0123456789ABCD"
                    cak-name "AA0123456789ABCDEF0123456789ABCD" # for tests only we use the name equal to the cak
                }
                pre-shared-key 2 {
                    encryption-type aes-128-cmac
                    cak "AA123456789ABCDEF0123456789ABCDE"
                    cak-name "AA123456789ABCDEF0123456789ABCDE" # for tests only we use the name equal to the cak
                }
            }
        }
        connectivity-association "CA_B" {
            admin-state enable
            description "Anysec Service B"
            clear-tag-mode none
            cipher-suite gcm-aes-xpn-128
            anysec true
            static-cak {
                active-psk 1
                pre-shared-key 1 {
                    encryption-type aes-128-cmac
                    cak "BB0123456789ABCDEF0123456789ABCD"
                    cak-name "BB0123456789ABCDEF0123456789ABCD" # for tests only we use the name equal to the cak
                }
                pre-shared-key 2 {
                    encryption-type aes-128-cmac
                    cak "BB123456789ABCDEF0123456789ABCDE"
                    cak-name "BB123456789ABCDEF0123456789ABCDE" # for tests only we use the name equal to the cak
                }
            }
        }
    }
    policy-options {
        prefix-list "loopbacks" {
            prefix 10.46.0.0/16 type longer {
            }
            prefix fd00:fde8::/96 type longer {
            }
        }
        prefix-list "underlay" {
            prefix 10.64.0.0/16 type through {
                through-length 29
            }
            prefix fd00:fde8::/32 type through {
                through-length 64
            }
            prefix fd00:fde8:0:1::/64 type through {
                through-length 80
            }
        }
        policy-statement "eBGP-redist-dc" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "eBGP-accept-dc" {
            entry 10 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "iBGP-redist" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 30 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                    next-hop self
                }
            }
            entry 40 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            default-action {
                action-type reject
            }
        }
    }
    port 1/1/c1 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c1/1 {
        admin-state enable
        description "link to P1"
        ethernet {
            mode network
            lldp {
                dest-mac nearest-bridge {
                    port-id-subtype tx-if-name
                    receive true
                    transmit true
                    tx-tlvs {
                        port-desc true
                        sys-name true
                        sys-desc true
                        sys-cap true
                    }
                    tx-mgmt-address system {
                        admin-state enable
                    }
                }
            }
        }
    }
    port 1/1/c2 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c2/1 {
        admin-state enable
        description "link to P2"
        ethernet {
            mode network
            lldp {
                dest-mac nearest-bridge {
                    port-id-subtype tx-if-name
                    receive true
                    transmit true
                    tx-tlvs {
                        port-desc true
                        sys-name true
                        sys-desc true
                        sys-cap true
                    }
                    tx-mgmt-address system {
                        admin-state enable
                    }
                }
            }
        }
    }
    port 1/1/c3 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c3/1 {
        admin-state enable
        description "link to spine11"
        ethernet {
            mode network
            lldp {
                dest-mac nearest-bridge {
                    port-id-subtype tx-if-name
                    receive true
                    transmit true
                    tx-tlvs {
                        port-desc true
                        sys-name true
                        sys-desc true
                        sys-cap true
                    }
                    tx-mgmt-address system {
                        admin-state enable
                    }
                }
            }
        }
    }
    port 1/1/c4 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c4/1 {
        admin-state enable
        description "link to spine12"
        ethernet {
            mode network
            lldp {
                dest-mac nearest-bridge {
                    port-id-subtype tx-if-name
                    receive true
                    transmit true
                    tx-tlvs {
                        port-desc true
                        sys-name true
                        sys-desc true
                        sys-cap true
                    }
                    tx-mgmt-address system {
                        admin-state enable
                    }
                }
            }
        }
    }
    port 1/1/c5 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c5/1 {
        admin-state enable
        ethernet {
            mode network
        }
    }
    port 1/1/c6 {
        admin-state enable
        connector {
            breakout c1-100g
        }
    }
    port 1/1/c6/1 {
        admin-state enable
        description "link to client03"
        ethernet {
            mode access
            encap-type dot1q
            mtu 9022
        }
    }
    router "Base" {
        autonomous-system 65000
        ecmp 64
        router-id 10.46.${INSTANCE_ID}.23
        aggregates {
            aggregate 10.64.23.0/24 {
                summary-only true
                blackhole {
                }
            }
            aggregate 10.46.0.0/16 {
                community ["65000:10"]
                summary-only false
                blackhole {
                }
            }
            aggregate fd00:fde8::/96 {
                community ["65000:10"]
                summary-only false
                blackhole {
                }
            }
            aggregate fd00:fde8:2300::/40 {
                summary-only true
                blackhole {
                }
            }
        }
        interface "system" {
            ipv4 {
                primary {
                    address 10.46.${INSTANCE_ID}.23
                    prefix-length 32
                }
            }
            ipv6 {
                address fd00:fde8::${INSTANCE_ID}:23 {
                    prefix-length 128
                }
            }
        }
        interface "spine11" {
            port 1/1/c3/1
            ipv6 {
                forward-ipv4-packets true
                address fd00:fde8:0:1:${INSTANCE_ID}:23:31:0 {
                    prefix-length 127
                }
            }
        }
        interface "spine12" {
            port 1/1/c4/1
            ipv6 {
                forward-ipv4-packets true
                address fd00:fde8:0:1:${INSTANCE_ID}:23:32:0 {
                    prefix-length 127
                }
            }
        }
        interface "p1" {
            port 1/1/c1/1
            ipv4 {
                primary {
                    address 10.64.11.5
                    prefix-length 31
                }
            }
            ipv6 {
                forward-ipv4-packets true
                address fd00:fde8:0:1:${INSTANCE_ID}:11:23:1 {
                    prefix-length 127
                }
            }
        }
        interface "p2" {
            port 1/1/c2/1
            ipv4 {
                primary {
                    address 10.64.12.5
                    prefix-length 31
                }
            }
            ipv6 {
                forward-ipv4-packets true
                address fd00:fde8:0:1:${INSTANCE_ID}:12:23:1 {
                    prefix-length 127
                }
            }
        }
        ipv6 {
            router-advertisement {
                interface "spine11" {
                    admin-state enable
                }
                interface "spine12" {
                    admin-state enable
                }
            }
        }
        mpls-labels {
            sr-labels {
                start 21000
                end 30000
            }
            static-label-range 1968
            ### labels reserved for activity 19-Enable_per_service-PQC_encryption_with_ANYsec
            reserved-label-block "Anysec" {
                start-label 2000
                end-label 5999
            }
        }
        bgp {
            loop-detect discard-route
            min-route-advertisement 1
            path-mtu-discovery true
            router-id 10.46.${INSTANCE_ID}.23
            inter-as-vpn true
            ibgp-multipath true
            advertise-inactive true
            rapid-withdrawal true
            peer-ip-tracking true
            rapid-update {
                vpn-ipv4 true
                vpn-ipv6 true
                evpn true
            }
            add-paths {
                ipv4 {
                    send 8
                    receive true
                }
                ipv6 {
                    send 8
                    receive true
                }
                evpn {
                    send 8
                    receive true
                }
            }
            extended-nh-encoding {
                vpn-ipv4 true
                label-ipv4 true
                ipv4 true
            }
            next-hop-resolution {
                shortcut-tunnel {
                    family ipv4 {
                        resolution filter
                        resolution-filter {
                            sr-isis true
                        }
                    }
                    family ipv6 {
                        resolution filter
                        resolution-filter {
                            sr-isis true
                        }
                    }
                }
                labeled-routes {
                    transport-tunnel {
                        family vpn {
                            resolution filter
                            resolution-filter {
                                sr-isis true
                            }
                        }
                    }
                }
            }
            multipath {
                max-paths 64
                ebgp 64
                ibgp 64
                family ipv4 {
                }
                family ipv6 {
                }
            }
            group "dc1" {
                admin-state enable
                peer-as 4200001000
                family {
                    ipv4 true
                    ipv6 true
                }
                send-default {
                    ipv4 true
                    ipv6 true
                }
                advertise-ipv6-next-hops {
                    ipv4 true
                }
                import {
                    policy ["eBGP-accept-dc"]
                }
                export {
                    policy ["eBGP-redist-dc"]
                }
                dynamic-neighbor {
                    interface "spine11" {
                        allowed-peer-as ["4200001000"]
                    }
                    interface "spine12" {
                        allowed-peer-as ["4200001000"]
                    }
                }
            }
            group "iBGP-CORE" {
                admin-state enable
                connect-retry 1
                peer-as 65000
                family {
                    ipv4 true
                    ipv6 true
                    vpn-ipv4 true
                    vpn-ipv6 true
                    evpn true
                }
                export {
                    policy ["iBGP-redist"]
                }
                advertise-ipv6-next-hops {
                    vpn-ipv6 true
                    label-ipv6 true
                    evpn true
                    vpn-ipv4 true
                    label-ipv4 true
                    ipv4 true
                }
            }
            group "iBGP-DC" {
                admin-state enable
                connect-retry 1
                peer-as 65000
                family {
                    evpn true
                }
                advertise-ipv6-next-hops {
                    evpn true
                }
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:11" {
                group "iBGP-CORE"
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:12" {
                group "iBGP-CORE"
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:13" {
                group "iBGP-DC"
            }
        }
        isis 0 {
            admin-state enable
            advertise-router-capability as
            ipv4-routing true
            ipv6-routing native
            level-capability 2
            area-address [49.0000.0000.01]
            loopfree-alternate {
                augment-route-table true
                remote-lfa {
                }
            }
            segment-routing {
                admin-state enable
                prefix-sid-range {
                    global
                }
            }
            interface "p1" {
                interface-type point-to-point
            }
            interface "p2" {
                interface-type point-to-point
            }
            interface "system" {
                admin-state enable
                passive true
                level-capability 2
                ipv4-node-sid {
                    index 23
                }
                ipv6-node-sid {
                    index 123
                }
            }
            level 2 {
                wide-metrics-only true
            }
        }
        ldp {
            admin-state enable
        }
        mpls {
            admin-state enable
            interface "p1" {
            }
            interface "p2" {
            }
        }
        rsvp {
            admin-state enable
            interface "p1" {
            }
            interface "p2" {
            }
        }
    }
    service {
        customer "1" {
            customer-id 1
        }
        system {
            bgp-auto-rd-range {
                ip-address 10.46.${INSTANCE_ID}.23
                community-value {
                    start 30000
                    end 40000
                }
            }
        }
        ies "client03" {
            admin-state enable
            service-id 100
            customer "1"
            interface "irb" {
                admin-state enable
                sap 1/1/c6/1:1 {
                }
                ipv4 {
                    primary {
                        address 10.64.23.1
                        prefix-length 27
                    }
                }
                ipv6 {
                    address fd00:fde8:0:23::1 {
                        prefix-length 64
                    }
                }
            }
        }
        vprn "dci" {
            admin-state enable
            service-id 300
            customer "1"
            autonomous-system 65501
            ecmp 8
            bgp-evpn {
                vxlan 1 {
                    admin-state enable
                    route-distinguisher auto-rd
                    domain-id "65000:1201"
                    evi 201
                    vxlan-instance 1
                    vrf-target {
                        community "target:65000:1201"
                    }
                }
            }
            bgp-ipvpn {
                mpls {
                    admin-state enable
                    route-distinguisher auto-rd
                    domain-id "65000:300"
                    vrf-target {
                        community "target:65000:300"
                    }
                    auto-bind-tunnel {
                        resolution any
                    }
                }
            }
            interface "client03" {
                admin-state enable
                ip-mtu 8700
                ipv4 {
                    primary {
                        address 192.168.23.1
                        prefix-length 24
                    }
                }
                sap 1/1/c6/1:300 {
                }
                ipv6 {
                    address fd00:ffdd:0:23::1 {
                        prefix-length 64
                    }
                }
            }
            vxlan {
                instance 1 {
                    vni 201
                }
            }
        }
### SDP for Activity 19-Enable_per_service-PQC_encryption_with_ANYsec
        sdp 2222 {
            admin-state enable
            description "To PE2 - for activity 19"
            delivery-type mpls
            sr-isis true
            far-end {
                ip-address 10.46.${INSTANCE_ID}.22   ### Replace ${INSTANCE_ID} with your Group ID
            }
        }
### VLL for Activity 19-Enable_per_service-PQC_encryption_with_ANYsec
        epipe "Svc-A_Epipe" {
            service-id 1002
            admin-state enable
            description "Epipe Svc A"
            customer "1"
            service-mtu 8100
            spoke-sdp 2222:1002 {
                admin-state enable
                anysec-encryption-group "EG_A"   ### Must be enabled for the activity flow
            }
            sap 1/1/c6/1:1002 {
                admin-state enable
            }
        }
        epipe "Svc-B_Epipe" {
            service-id 1003
            admin-state enable
            description "Epipe Svc B"
            customer "1"
            service-mtu 8100
            spoke-sdp 2222:1003 {
                admin-state enable
                #anysec-encryption-group "EG_B"     ### Must be disabled for the activity flow
            }
            sap 1/1/c6/1:1003 {
                admin-state enable
            }
        }
    }
    system {
        name "g${INSTANCE_ID}-pe3"
        load-balancing {
            l4-load-balancing true
            lsr-load-balancing lbl-ip
        }
        management-interface {
            cli {
                md-cli {
                    environment {
                        info-output {
                            always-display {
                                admin-state true
                            }
                        }
                        prompt {
                            timestamp true
                        }
                    }
                }
            }
            yang-modules {
                nmda {
                    nmda-support true
                }
            }
        }
        login-control {
            ssh {
                inbound-max-sessions 15
            }
        }
        security {
            snmp {
                community "cV3ISTw2V5pbEWmVEA9jXgB/1EERXQA= hash2" {
                    access-permissions rwa
                    version both
                }
                community "76HzdddhlPpRo1Vql+ZB5spLqccgYQ== hash2" {
                    access-permissions r
                    version v2c
                }
            }
            user-params {
                attempts {
                    count 64
                    lockout 0
                }
                local-user {
                    user "admin" {
                        password "${EVENT_PASSWORD}"
                        restricted-to-home false
                        access {
                            console true
                            ftp true
                            netconf true
                            grpc true
                        }
                        console {
                            member ["administrative"]
                        }
                    }
                }
            }
        }
    }
}
