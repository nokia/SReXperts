            aggregate 10.46.0.0/16 {
                community ["65000:10"]
                summary-only false
                blackhole {
                }
            }
            aggregate fd00:fde8::/96 {
                community ["65000:10"]
                summary-only false
                blackhole {
                }
            }
            aggregate fd00:fde8:2400::/40 {
                summary-only true
