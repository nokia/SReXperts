configure {
    aaa {
        radius {
            server-policy "RadPolicy1" {
                servers {
                    router-instance "Base"
                    source-address 10.46.${INSTANCE_ID}.24
                    server 1 {
                        server-name "radius"
                    }
                }
            }
        }
    }
    card 1 {
        card-type iom5-e
        mda 1 {
            mda-type me12-100gb-qsfp28
        }
        mda 2 {
            admin-state disable
        }
    }
    card 2 {
        card-type iom4-e
        mda 1 {
            mda-type isa2-bb
        }
        mda 2 {
            admin-state disable
        }
    }
    filter {
        ip-filter "ingress-subscriber-filter" {
            filter-id 10
            entry 5 {
                match {
                    dst-ip {
                        address 10.24.1.0
                        mask 255.255.255.0
                    }
                }
                action {
                    accept
                }
            }
            entry 10 {
                match {
                    dst-ip {
                        address 192.168.211.1
                        mask 255.255.255.255
                    }
                }
                action {
                    accept
                }
            }
            entry 20 {
                match {
                    src-ip {
                        address 10.24.1.0
                        mask 255.255.255.0
                    }
                }
                action {
                    nat {
                    }
                }
            }
        }
    }
    isa {
        nat-group 1 {
            admin-state enable
            scaling-profile profile2
            redundancy {
                active-mda-limit 1
            }
            mda 2/1 { }
        }
    }
    log {
        log-id "21" {
            admin-state enable
            description "debug log"
            source {
                debug true
            }
            destination {
                cli {
                }
            }
        }
        log-id "98" {
            description "Default System Log to Syslog"
            source {
                main true
            }
            destination {
                syslog "1"
            }
        }
        route-preference {
            primary outband
        }
        syslog "1" {
            description "syslog container"
            address 10.128.${INSTANCE_ID}.74
            severity info
            port 5514
            hostname {
                use-system-name { }
            }
        }
    }
    policy-options {
        prefix-list "loopbacks" {
            prefix 10.46.0.0/16 type longer {
            }
            prefix fd00:fde8::/96 type longer {
            }
        }
        prefix-list "sub-ipv6-public" {
            prefix fd00:fde8:2400::/44 type longer {
            }
        }
        prefix-list "underlay" {
            prefix 10.64.0.0/16 type through {
                through-length 29
            }
            prefix fd00:fde8::/32 type through {
                through-length 64
            }
            prefix fd00:fde8:0:1::/64 type through {
                through-length 80
            }
        }
        policy-statement "eBGP-redist-dc" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "eBGP-accept-dc" {
            entry 10 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
        }
        policy-statement "iBGP-redist" {
            entry 10 {
                from {
                    protocol {
                        name [aggregate]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 20 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [direct]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 30 {
                from {
                    prefix-list ["loopbacks"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                    next-hop self
                }
            }
            entry 40 {
                from {
                    prefix-list ["underlay"]
                    protocol {
                        name [bgp]
                    }
                }
                action {
                    action-type accept
                }
            }
            entry 50 {
                from {
                    protocol {
                        name [nat]
                    }
                }
                action {
                    action-type accept
                }
            }
            default-action {
                action-type reject
            }
        }
        policy-statement "sub-to-grt" {
            entry 10 {
                from {
                    prefix-list ["sub-ipv6-public"]
                    protocol {
                        name [direct]
                    }
                }
                action {
                    action-type accept
                }
            }
            default-action {
                action-type reject
            }
        }
    }
