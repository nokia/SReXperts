                    interface "spine22" {
                        allowed-peer-as ["4200002000"]
                    }
                }
            }
            group "iBGP-CORE" {
                admin-state enable
                connect-retry 1
                peer-as 65000
                family {
                    ipv4 true
                    ipv6 true
                    vpn-ipv4 true
                    vpn-ipv6 true
                    evpn true
                }
                export {
                    policy ["iBGP-redist"]
                }
                advertise-ipv6-next-hops {
                    vpn-ipv6 true
                    label-ipv6 true
                    evpn true
                    vpn-ipv4 true
                    label-ipv4 true
                    ipv4 true
                }
            }
            group "iBGP-DC" {
                admin-state enable
                connect-retry 1
                peer-as 65000
                family {
                    evpn true
                }
                advertise-ipv6-next-hops {
                    evpn true
                }
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:11" {
                group "iBGP-CORE"
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:12" {
                group "iBGP-CORE"
            }
            neighbor "fd00:fde8::${INSTANCE_ID}:13" {
                group "iBGP-DC"
            }
        }
        isis 0 {
