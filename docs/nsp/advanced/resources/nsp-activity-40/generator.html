  <script>
    function getCurrentUtcFormatted() {
      const now = new Date();
      const days = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
        "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const dayName = days[now.getUTCDay()];
      const day = String(now.getUTCDate()).padStart(2, "0");
      const monthName = months[now.getUTCMonth()];
      const year = now.getUTCFullYear();
      return `${dayName}, ${day} ${monthName} ${year} ` +
        `${String(now.getUTCHours()).padStart(2, "0")}:` +
        `${String(now.getUTCMinutes()).padStart(2, "0")}:` +
        `${String(now.getUTCSeconds()).padStart(2, "0")} UTC`;
    }

    function groupTag(groupId) {
      return "group" + String(groupId).padStart(2, "0");
    }

    function personalize(text, groupId) {
      return text.replace(/group00/g, groupTag(groupId));
    }

    const VERSION = "1.0.0";

    /**
     * NSP CAM artifact API base (no trailing slash); upload + install requests use this origin.
     * Group ID 2–40 → nsp1cam; 41–79 → nsp2cam. Other IDs (1, 80–99) use nsp1cam.
     */
    function getNspCamApiBase(groupId) {
      if (groupId >= 41 && groupId <= 79) {
        return "https://nsp2cam.srexperts.net";
      }
      return "https://nsp1cam.srexperts.net";

        lsoWorkflowStageMapping:

          - tools system configuration generate-checkpoint name nsp_<% $.timestamp %>
          - echo "End"
      publish:
        sourcePath: /etc/opt/srlinux/checkpoint/checkpoint-0.json
        checkpoint: checkpoint-0.json
      on-success:
        - CheckpointSuccess
      on-error:
        - CheckpointFailed

    createSROScheckpoint:
      action: std.noop

        - CheckpointSuccess
      on-error:
        - CheckpointFailed

      input:
        error_data: <% $.lsoInfo %>

        lsoStageError: <% $.lsoStageError %>

`;

    const CHECKREVERT_WF_YAML = `---
version: '2.0'

ne-revert-group00:
  type: direct
  
  tags:
    - Revert
    - SReXperts

  workflow_meta:
    title: Reverts from existing checkpoint
    author: NOKIA R&D
    version: '1.0.0'
    deprecated: false

  input:
    - neId
    - neName
    - neFamily
    - fromFS: false
    - pathLocal: ""
    - pathFS: ""

  vars:
    info: "Failed"
    stageError: "Failed"
    loadFile: ""
    fromFS: <% $.fromFS %>
    dryRun: <% options().dryRun %>
    stop: "([\\\\s\\\\S]*)(\\\\^*)[\\r\\n]*(MINOR:)([\\\\s\\\\S]*)|(([\\\\s\\\\S]*)(\\\\^*)[\\r\\n]*(Error:|ERROR:)([\\\\s\\\\S]*))"

  output:
    info: <% $.info %>
    loadFile: <% $.loadFile %>
    fromFS: <% $.fromFS %>

  output-on-error:
    info: "Error: <% $.info %>"

  tasks:
    stageMapping:
      action: nsp.python
      input:
        context:
          neFamily: <% $.neFamily %>
          fromFS: <% $.fromFS %>
          pathLocal: <% $.pathLocal %>
          pathFS: <% $.pathFS %>
        script: |
          if "SRLinux" in context["neFamily"]:
            loadFile = "/etc/opt/srlinux/checkpoint/"+context["pathLocal"].split("_")[-1]
            loadPath = "/etc/opt/srlinux/checkpoint/"
            loadFromFS = "/tmp/"
            fileExt = "json"
          else:
            loadFile = "cf3:/"+context["pathLocal"].split("_")[-1]
            loadPath = "cf3:/"
            loadFromFS = "cf3:/"
            fileExt = "cfg"
          return {
            "loadFile": loadFile,
            "loadPath": loadPath,
            "loadFromFS": loadFromFS,
            "fileExt": fileExt
          }
      publish:
        loadFile: <% task().result.loadFile %>
        loadPath: <% task().result.loadPath %>
        loadFromFS: <% task().result.loadFromFS %>
        fileExt: <% task().result.fileExt %>
        timestamp: <% regex(":").replace(regex(" ").replace(get_UTC_time(),"-"),".") %>
      publish-on-error:
        info: "Failed to determine the file path and extension for the checkpoint file based on NE family"
      on-success:
        - revertFromFileSRL: <% not $.fromFS and $.neFamily.indexOf("SRLinux") != -1 %>
      on-error:
        - RevertFailed

    revertFromFileSRL:
      action: nsp.managed_cli
      input:
        neId: <% $.neId %>
        stopOn: <% $.stop %>
        idleTimeout: 30
        closeSession: true
        cmds:
          - environment cli-engine type basic
          - echo "Start"
          - enter candidate
          - load file <% $.loadFile %>
          - commit now
          - <% switch($.fromFS = true => "bash rm /tmp/nsp_checkpoint.json", $.fromFS = false => "echo 'Local'") %>
          - echo "End"
      publish:
        info: "Revert from file <% $.loadFile %> successfully completed"
      publish-on-error:
        info: "Revert from file <% $.loadFile %> failed"
      on-success:
        - RevertSuccess
      on-error:
        - RevertFailed
      
    RevertSuccess:
      join: 0
      publish:
        info: "Checkpoint Successful"
      on-complete:
        - succeed 

    RevertFailed:
      join: 0
      action: std.fail
      input:
        error_data: <% $.info %>   
      publish-on-error:
        stageError: <% $.stageError %>
        info: <% task().result %>  `;

getLCCheckpoints-group00:
  description:  |
    Test script filter
  base: nsp.managed_cli
  base-input:
    neId: <% $.formValues.neId %>

    function artifactEntry(path, fileName) {
      return {
        type: "application/octet-stream",
        path,
        fileName
      };
    }

    function buildCheckrevertMetadata(groupId, creationDate) {
      const g = groupTag(groupId);
      return {
        "meta-data-header": {
          version: VERSION,
          buildNumber: "1",
          formatVersion: "1.0",
          createdBy: "SReXperts",
          creationDate,
          title: "NE Checkpoint",
          description: "NE Checkpoint Operation Bundle for SReXperts"
        },
        "artifact-meta-data": [
          {
            targetApplication: "workflow-manager",
            applicationCompatibility: "25.8+",
            version: VERSION,
            name: `actions-revert-${g}`,
            "artifact-content": [
              artifactEntry(`content/actions-revert-${g}`, `getFSCheckpoints-${g}.action`),
              artifactEntry(`content/actions-revert-${g}`, `getLCCheckpoints-${g}.action`)
            ]
          },
          {
            targetApplication: "workflow-manager",
            applicationCompatibility: "25.8+",
            version: VERSION,
            name: `ne-checkpoint-${g}`,
            "artifact-content": [
              artifactEntry(`content/ne-checkpoint-${g}`, "README.md"),
              artifactEntry(`content/ne-checkpoint-${g}`, `ne-checkpoint-${g}.json`),
              artifactEntry(`content/ne-checkpoint-${g}`, `ne-checkpoint-${g}.yaml`)
            ]
          },
          {
            targetApplication: "workflow-manager",
            applicationCompatibility: "25.8+",
            version: VERSION,
            name: `ne-revert-${g}`,
            "artifact-content": [
              artifactEntry(`content/ne-revert-${g}`, "README.md"),
              artifactEntry(`content/ne-revert-${g}`, `ne-revert-${g}.json`),
              artifactEntry(`content/ne-revert-${g}`, `ne-revert-${g}.yaml`)
            ]
          },
          {
            targetApplication: "lsom-server-app",
            applicationCompatibility: "25.8+",
            version: VERSION,
            name: `operation-checkpoint-${g}`,
            "artifact-content": [
              artifactEntry(`content/operation-checkpoint-${g}`, `ne-checkpoint-${g}.yaml`),
              artifactEntry(`content/operation-checkpoint-${g}`, `ne-checkpoint-${g}.yang`),
              artifactEntry(`content/operation-checkpoint-${g}`, "operation_types.json")
            ]
          }
        ]
      };
    }

    function parseGroupId() {
      const groupIdRaw = document.getElementById("groupId").value.trim();
      const groupId = parseInt(groupIdRaw, 10);
      if (!groupIdRaw || isNaN(groupId)) {
        return { ok: false, error: "Please enter a valid Group ID." };
      }
      if (groupId < 1 || groupId > 99) {
        return { ok: false, error: "Group ID must be between 1 and 99." };
      }
      return { ok: true, groupId };
    }

    function hideError() {
      const el = document.getElementById("errorPanel");
      el.hidden = true;
      el.textContent = "";
    }

    function showError(message) {
      const el = document.getElementById("errorPanel");
      el.textContent = message;
      el.hidden = false;
    }

    function setProgress(visible, percent, message) {
      const panel = document.getElementById("progressPanel");
      const bar = document.getElementById("progressBar");
      const msg = document.getElementById("progressMessage");
      panel.hidden = !visible;
      bar.value = percent;
      msg.textContent = message || "";
    }

    function delay(ms) {
      return new Promise(function (resolve) {
        setTimeout(resolve, ms);
      });
    }

    /** Poll GET bundle until summary.status is Installed. */
    const BUNDLE_INSTALL_POLL_INTERVAL_MS = 2000;
    const BUNDLE_INSTALL_POLL_MAX_ATTEMPTS = 150;

    async function readResponseDetail(res) {
      const text = await res.text();
      if (!text) {
        return res.statusText || String(res.status);
      }
      try {
        return JSON.stringify(JSON.parse(text), null, 2);
      } catch {
        return text;
      }
    }

    async function buildBundleZip(groupId) {
      const g = groupTag(groupId);
      const creationDate = getCurrentUtcFormatted();
      const zip = new JSZip();

      zip.file("metadata.json", JSON.stringify(buildCheckrevertMetadata(groupId, creationDate), null, 2));

      const ar = `actions-revert-${g}`;
      zip.file(`content/${ar}/getFSCheckpoints-${g}.action`, personalize(REVERT_ACTION_FS, groupId));
      zip.file(`content/${ar}/getLCCheckpoints-${g}.action`, personalize(REVERT_ACTION_LC, groupId));

      const ck = `ne-checkpoint-${g}`;
      zip.folder("content").folder(ck).file("README.md", personalize(CHECKPOINT_README, groupId));
      zip.file(`content/${ck}/ne-checkpoint-${g}.json`, personalize(CHECKPOINT_WF_JSON, groupId));
      zip.file(`content/${ck}/ne-checkpoint-${g}.yaml`, personalize(CHECKPOINT_WF_YAML, groupId));

      const rv = `ne-revert-${g}`;
      zip.folder("content").folder(rv).file("README.md", personalize(REVERT_README, groupId));
      zip.file(`content/${rv}/ne-revert-${g}.json`, personalize(REVERT_WF_JSON, groupId));
      zip.file(`content/${rv}/ne-revert-${g}.yaml`, personalize(CHECKREVERT_WF_YAML, groupId));

      const op = `operation-checkpoint-${g}`;
      zip.file(`content/${op}/ne-checkpoint-${g}.yaml`, personalize(CHECKPOINT_OP_YAML, groupId));
      zip.file(`content/${op}/ne-checkpoint-${g}.yang`, personalize(CHECKPOINT_OP_YANG, groupId));
      zip.file(`content/${op}/operation_types.json`, personalize(CHECKPOINT_OPERATION_TYPES, groupId));

      const blob = await zip.generateAsync({ type: "blob" });
      const bundleName = `ne-checkpoint-revert-1.0.0-g`+String(groupId);
      return { blob, bundleName };
    }

    function bundleZipFileName(bundleName) {
      return bundleName + ".zip";
    }

    async function uploadArtifact(base, groupId, blob, bundleName) {
      const url =
        `${base}/nsp/cam/group/${groupId}/bundle/upload`;
      const formData = new FormData();
      formData.append("file", blob, bundleZipFileName(bundleName));
      const res = await fetch(url, { method: "POST", body: formData });
      if (!res.ok) {
        const detail = await readResponseDetail(res);
        throw new Error(`Upload failed (${res.status} ${res.statusText}). ${detail}`);
      }
      return res.json().catch(() => ({}));
    }

    async function installArtifact(base, groupId, bundleName) {
      const enc = encodeURIComponent(bundleZipFileName(bundleName));
      const url =
        `${base}/nsp/cam/group/${groupId}/bundle/${enc}/install`;
      const res = await fetch(url, { method: "POST" });
      if (!res.ok) {
        const detail = await readResponseDetail(res);
        throw new Error(`Install failed (${res.status} ${res.statusText}). ${detail}`);
      }
      return res.json().catch(() => ({}));
    }

    /**
     * GET /nsp/cam/group/{group_id}/bundle/{bundle_name} until summary.status is Installed.
     */
    async function waitForBundleInstalled(base, groupId, bundleName, onPoll) {
      const enc = encodeURIComponent(bundleZipFileName(bundleName));
      const url = `${base}/nsp/cam/group/${groupId}/bundle/${enc}`;
      for (let attempt = 1; attempt <= BUNDLE_INSTALL_POLL_MAX_ATTEMPTS; attempt++) {
        const res = await fetch(url, { method: "GET" });
        if (!res.ok) {
          const detail = await readResponseDetail(res);
          throw new Error(`Bundle status check failed (${res.status} ${res.statusText}). ${detail}`);
        }
        const data = await res.json().catch(() => ({}));
        const summary = data && data.summary;
        const statusStr =
          summary && typeof summary.status === "string" ? summary.status.trim() : "";
        if (/^installed$/i.test(statusStr)) {
          return data;
        }
        if (statusStr && /^(failed|error|rejected|invalid)$/i.test(statusStr)) {
          throw new Error(
            `Installation did not succeed: summary.status is "${statusStr}".`
          );
        }
        if (typeof onPoll === "function") {
          onPoll(attempt, statusStr, summary);
        }
        await delay(BUNDLE_INSTALL_POLL_INTERVAL_MS);
      }
      throw new Error(
        `Timeout: summary.status did not become "Installed" after ${BUNDLE_INSTALL_POLL_MAX_ATTEMPTS} checks (~${Math.round((BUNDLE_INSTALL_POLL_MAX_ATTEMPTS * BUNDLE_INSTALL_POLL_INTERVAL_MS) / 60000)} min).`
      );
    }

    /**
     * POST /nsp/cam/group/{group_id}/bundle/{bundle_name}/associate with body {}.
     */
    async function associateBundle(base, groupId, bundleName) {
      const enc = encodeURIComponent(bundleZipFileName(bundleName));
      const url =
        `${base}/nsp/cam/group/${groupId}/bundle/${enc}/associate`;
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: "{}",
      });
      if (!res.ok) {
        const detail = await readResponseDetail(res);
        throw new Error(`Associate failed (${res.status} ${res.statusText}). ${detail}`);
      }
      return res.json().catch(() => ({}));
    }

    document.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        document.getElementById("generateBtn").click();
      }
    });

    const generateBtn = document.getElementById("generateBtn");
    const uploadNspBtn = document.getElementById("uploadNspBtn");

    generateBtn.addEventListener("click", async () => {
      const status = document.getElementById("status");
      status.textContent = "";
      hideError();
      setProgress(false, 0, "");

      const parsed = parseGroupId();
      if (!parsed.ok) {
        window.alert(parsed.error);
        return;
      }
      const { groupId } = parsed;

      status.textContent = "Generating ZIP…";
      try {
        const { blob, bundleName } = await buildBundleZip(groupId);
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${bundleName}.zip`;
        a.click();
        URL.revokeObjectURL(a.href);
        status.textContent = "ZIP generated and downloaded.";
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        showError(`Generation failed: ${msg}`);
        status.textContent = "";
      }
    });

    uploadNspBtn.addEventListener("click", async () => {
      const status = document.getElementById("status");
      status.textContent = "";
      hideError();

      const parsed = parseGroupId();
      if (!parsed.ok) {
        window.alert(parsed.error);
        return;
      }
      const { groupId } = parsed;

      generateBtn.disabled = true;
      uploadNspBtn.disabled = true;

      try {
        const camBase = getNspCamApiBase(groupId);
        setProgress(true, 10, "Step 1 of 5: Generating bundle…");
        const { blob, bundleName } = await buildBundleZip(groupId);

        setProgress(true, 25, `Step 2 of 5: Uploading bundle to ${new URL(camBase).host}…`);
        await uploadArtifact(camBase, groupId, blob, bundleName);

        setProgress(true, 35, "Waiting 5 seconds before install…");
        await delay(5000);

        setProgress(true, 50, "Step 3 of 5: Installing bundle on NSP…");
        await installArtifact(camBase, groupId, bundleName);

        await waitForBundleInstalled(
          camBase,
          groupId,
          bundleName,
          function (attempt, statusStr, summary) {
            const namePart =
              summary && summary.name != null ? String(summary.name) : bundleZipFileName(bundleName);
            const pct = Math.min(90, 58 + Math.min(attempt, 32));
            setProgress(
              true,
              pct,
              "Step 4 of 5: Validating installation — waiting for summary.status \"Installed\"… " +
                "poll #" +
                attempt +
                ", status: \"" +
                (statusStr || "—") +
                "\", name: " +
                namePart
            );
          }
        );

        setProgress(true, 94, "Step 5 of 5: Associating bundle…");
        await associateBundle(camBase, groupId, bundleName);

        setProgress(true, 100, "Done: uploaded, installed, validated, and associated.");
        status.textContent =
          `Completed ${bundleZipFileName(bundleName)} for group ${groupId} on ${new URL(camBase).host} (installed + associated).`;
      } catch (err) {
        const msg = err && err.message ? err.message : String(err);
        showError(msg);
        setProgress(false, 0, "");
        status.textContent = "";
      } finally {
        generateBtn.disabled = false;
        uploadNspBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
