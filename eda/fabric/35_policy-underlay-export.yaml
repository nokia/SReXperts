# --- Custom underlay BGP export policy ---
# this is required to export the IRB anycast gateway
# route to the WAN network, so connectivity is achieved
# throughout the network
apiVersion: routingpolicies.eda.nokia.com/v1
kind: Policy
metadata:
  name: ebgp-isl-export-policy-srexperts-fabric-custom
  namespace: eda
  labels:
    role: hackathon-infra
spec:
  defaultAction:
    policyResult: Reject
    bgp:
      setOrigin: "igp"
  statements:
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        prefixSet: prefixset-grt
        protocol: Local
      name: "10"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        protocol: BGP
      name: "15"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        protocol: Aggregate
      name: "20"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        bgp:
          evpnRouteTypes:
            - 1
      name: "25"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        bgp:
          evpnRouteTypes:
            - 2
      name: "30"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        bgp:
          evpnRouteTypes:
            - 3
      name: "35"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        bgp:
          evpnRouteTypes:
            - 4
      name: "40"
    - action:
        bgp:
          setLocalPreference: 100
        policyResult: Accept
      match:
        bgp:
          evpnRouteTypes:
            - 5
      name: "45"
---
# prefix set for the custom underlay export policy
apiVersion: routingpolicies.eda.nokia.com/v1
kind: PrefixSet
metadata:
  name: prefixset-grt
  namespace: eda
  labels:
    role: hackathon-infra
spec:
  prefixes:
    - endRange: 128
      exact: false
      prefix: fd00:fde8::${INSTANCE_ID}:0/120
      startRange: 128
    - endRange: 32
      exact: false
      prefix: 10.46.${INSTANCE_ID}.0/24
      startRange: 32
    - exact: true
      prefix: 10.64.30.0/24
    - exact: true
      prefix: fd00:fde8:0:30::/64
