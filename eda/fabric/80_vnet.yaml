apiVersion: services.eda.nokia.com/v2
kind: VirtualNetwork
metadata:
  name: vnet1201
  namespace: eda
  labels:
    role: hackathon-infra
spec:
  bridgeDomains:
    - name: macvrf1101
      spec:
        evi: 1101
        eviPool: evi-pool
        exportTarget: target:65000:1101
        importTarget: target:65000:1101
        type: EVPNVXLAN
        encapOptions:
          vxlan:
            vni: 1101
            vniPool: vni-pool
            tunnelIndexPool: tunnel-index-pool
  irbInterfaces:
    - name: irb0
      spec:
        ipv4:
          arpTimeoutSeconds: 14400
          learnUnsolicitedARP: Enabled
        bridgeDomain: macvrf1101
        evpnRouteAdvertisementType:
          arpDynamic: true
          arpStatic: true
          ndDynamic: true
          ndStatic: true
        ipAddresses:
          - ipv4Address:
              ipPrefix: 192.168.30.1/24
              primary: false
            ipv6Address:
              ipPrefix: fd00:ffdd:0:30::1/64
              primary: false
        ipMTU: 8700
        router: ipvrf1201
  routers:
    - name: ipvrf1201
      spec:
        bgp:
          ebgpPreference: 170
          enabled: false
          ibgpPreference: 170
          minWaitToAdvertiseSeconds: 0
          rapidWithdrawl: true
          waitForFIBInstall: false
        evi: 1200
        eviPool: evi-pool
        exportTarget: target:65000:1201
        importTarget: target:65000:1201
        type: EVPNVXLAN
        encapOptions:
          vxlan:
            vni: 1201
            vniPool: vni-pool
            tunnelIndexPool: tunnel-index-pool
  vlans:
    - name: vlan1101
      spec:
        bridgeDomain: macvrf1101
        interfaceSelectors:
          - edge-type=compute
        uplink:
          uplinkVLANID: pool
        vlanID: "1101"
